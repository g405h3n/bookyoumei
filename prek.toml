default_install_hook_types = ["pre-commit", "commit-msg"]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "strip-trailers"
name = "Strip commit trailers"
language = "script"
entry = "scripts/strip-trailers.sh"
stages = ["commit-msg"]
always_run = true

[[repos.hooks]]
id = "swiftformat"
name = "SwiftFormat"
language = "script"
entry = "scripts/format.sh"
stages = ["pre-commit"]
pass_filenames = false

[[repos.hooks]]
id = "swiftlint"
name = "SwiftLint"
language = "script"
entry = "scripts/lint.sh"
stages = ["pre-commit"]
pass_filenames = false
